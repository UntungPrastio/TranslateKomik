name: Build Android APK Otomatis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Menggunakan mesin Gradle resmi dari GitHub secara langsung
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    # Langsung merakit tanpa menggunakan wrapper
    - name: Mulai Merakit APK
      run: gradle assembleDebug

    - name: Upload File APK Jadi
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-Terjemahan-Komik
        path: app/build/outputs/apk/debug/app-debug.apk
